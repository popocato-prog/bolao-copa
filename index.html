<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#EEF1F7}
.b-app{
  --ink:#0E1726; --ink2:#172a3a; --green:#15B37A; --greenDk:#0C8F5E; --greenSoft:#E6F7F0;
  --gold:#F4B53F; --goldDk:#B9810F; --goldSoft:#FFF4DC; --red:#E0574A; --redSoft:#FCEDEB;
  --card:#fff; --soft:#F3F6FB; --line:#E5EAF2; --mut:#69748C; --txt:#0F1726;
  font-family:'Inter',system-ui,sans-serif; color:var(--txt);
  background:#EEF1F7; min-height:100vh; max-width:760px; margin:0 auto;
  -webkit-font-smoothing:antialiased; padding-bottom:8px;
}
.b-center{display:flex;align-items:center;justify-content:center;min-height:70vh;padding:24px}
.b-load{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--greenDk);font-weight:600}
.b-load svg{color:var(--gold)}

.b-head{background:linear-gradient(135deg,#0E1726 0%,#123a2c 100%);color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:20}
.b-head-row{display:flex;align-items:center;justify-content:space-between}
.b-brand{display:flex;align-items:center;gap:11px}
.b-logo{width:38px;height:38px;border-radius:11px;background:var(--gold);color:#3a2a05;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 var(--goldDk)}
.b-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:21px;letter-spacing:.04em;line-height:1}
.b-sub{font-size:11.5px;color:rgba(255,255,255,.6);margin-top:3px;letter-spacing:.02em}
.b-refresh{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.b-refresh:hover{background:rgba(255,255,255,.22)}
.b-spin{animation:bspin .8s linear infinite}
@keyframes bspin{to{transform:rotate(360deg)}}
.b-idrow{display:flex;align-items:center;gap:9px;margin-top:12px}
.b-idlabel{font-size:13px;color:rgba(255,255,255,.7);font-weight:500;white-space:nowrap}
.b-select{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:14.5px;font-weight:600;padding:9px 11px;border-radius:10px;font-family:inherit;cursor:pointer}
.b-select option{color:#0F1726}
.b-idadd{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--green);color:#fff;border:none;padding:10px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}

.b-tabs{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;background:#EEF1F7;position:sticky;top:0;z-index:10;scrollbar-width:none}
.b-tabs::-webkit-scrollbar{display:none}
.b-tab{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);color:var(--mut);padding:8px 13px;border-radius:999px;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
.b-tab svg{opacity:.8}
.b-tab-on{background:var(--ink);color:#fff;border-color:var(--ink)}
.b-tab-on svg{opacity:1}

.b-main{padding:4px 12px 8px}
.b-err{background:var(--redSoft);border:1px solid #F2C4BE;color:#a13b30;padding:11px 13px;border-radius:12px;font-size:12.5px;margin:8px 0;line-height:1.45}

.b-chiprow{display:flex;gap:7px;overflow-x:auto;padding:6px 0 12px;scrollbar-width:none}
.b-chiprow::-webkit-scrollbar{display:none}
.b-chip{background:#fff;border:1px solid var(--line);color:var(--mut);padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;text-transform:capitalize}
.b-chip-on{background:var(--green);color:#fff;border-color:var(--green)}

.b-banner{background:var(--goldSoft);border:1px solid #F0D9A0;color:#7a5a12;padding:11px 13px;border-radius:12px;font-size:13px;margin-bottom:12px;line-height:1.45}
.b-empty{background:#fff;border:1px dashed var(--line);color:var(--mut);padding:22px 16px;border-radius:14px;text-align:center;font-size:14px;line-height:1.5}

.b-cards{display:grid;grid-template-columns:1fr;gap:11px}
@media(min-width:620px){.b-cards{grid-template-columns:1fr 1fr}}
.b-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 13px 11px;box-shadow:0 1px 2px rgba(16,23,38,.04)}
.b-card-top{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.b-grp{background:var(--ink);color:#fff;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.03em;font-family:'Barlow Condensed',sans-serif}
.b-when{font-size:12px;color:var(--mut);font-weight:500;text-transform:capitalize}
.b-del{margin-left:auto;background:none;border:none;color:#C2C9D6;cursor:pointer;display:flex;padding:2px}
.b-del:hover{color:var(--red)}

.b-match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.b-team{display:flex;align-items:center;gap:7px;min-width:0}
.b-team-h{justify-content:flex-end;text-align:right}
.b-team-a{justify-content:flex-start;text-align:left}
.b-tname{font-weight:600;font-size:14px;line-height:1.15;overflow:hidden;text-overflow:ellipsis}
.b-flag{font-size:20px;flex-shrink:0}
.b-cap{display:flex;align-items:center;gap:4px;background:var(--ink);padding:6px 8px;border-radius:11px;box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
.b-sc{width:34px;height:38px;border:none;border-radius:8px;background:#fff;color:var(--ink);font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:23px;text-align:center;padding:0}
.b-sc:disabled{background:rgba(255,255,255,.32);color:rgba(255,255,255,.6)}
.b-sc::placeholder{color:#B9C2D0}
.b-sc:focus{outline:2px solid var(--gold);outline-offset:1px}
.b-colon{color:#fff;font-weight:800;font-size:18px;font-family:'Barlow Condensed',sans-serif}
.b-palpite-lbl{text-align:center;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.12em;margin-top:5px;font-weight:600}

.b-divider{height:1px;background:var(--line);margin:11px 0 10px}
.b-official{display:flex;align-items:center;justify-content:space-between;gap:10px}
.b-off-lbl{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;font-weight:600;display:block;margin-bottom:5px}
.b-off-inputs{display:flex;align-items:center;gap:6px}
.b-off{width:32px;height:30px;border:1.5px solid var(--line);border-bottom:2px solid var(--red);border-radius:7px;background:var(--redSoft);color:var(--txt);font-weight:700;font-size:15px;text-align:center;font-family:inherit}
.b-off::placeholder{color:#D8A39C}
.b-off:focus{outline:2px solid var(--red);outline-offset:1px}
.b-off-x{color:var(--mut);font-weight:700;font-size:12px}
.b-pts-wrap{display:flex;align-items:center}
.b-pts{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;line-height:1;display:flex;align-items:baseline;gap:3px;padding:6px 11px;border-radius:10px}
.b-pts small{font-size:11px;font-weight:700;font-family:'Inter',sans-serif}
.b-pts-win{background:var(--goldSoft);color:var(--goldDk)}
.b-pts-zero{background:var(--soft);color:var(--mut)}
.b-pts-empty{font-size:11.5px;color:#AAB3C2;font-style:italic}

.b-addbtn{width:100%;margin-top:13px;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1.5px dashed #C7D0DE;color:var(--greenDk);padding:13px;border-radius:13px;font-weight:700;font-size:14.5px;cursor:pointer;font-family:inherit;transition:all .15s}
.b-addbtn:hover{border-color:var(--green);background:var(--greenSoft)}

.b-rank{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.b-rrow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px}
.b-rrow-top{border-color:#EBD9A8;background:linear-gradient(90deg,#FFFBF1,#fff)}
.b-rrow-me{box-shadow:0 0 0 2px var(--green)}
.b-rpos{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;width:30px;text-align:center;color:var(--ink)}
.b-rmid{flex:1;min-width:0}
.b-rname{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
.b-you{font-size:10px;background:var(--green);color:#fff;padding:2px 7px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.b-rbar{height:6px;background:var(--soft);border-radius:4px;margin:7px 0 5px;overflow:hidden}
.b-rfill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:4px;transition:width .4s}
.b-rmeta{font-size:11.5px;color:var(--mut)}
.b-rpts{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:30px;color:var(--greenDk);display:flex;align-items:baseline;gap:3px}
.b-rpts small{font-size:12px;color:var(--mut);font-weight:700;font-family:'Inter',sans-serif}

.b-regras{padding-top:4px}
.b-rtext{font-size:13.5px;color:var(--mut);line-height:1.5;margin-bottom:13px}
.b-presets{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.b-preset{flex:1;min-width:140px;background:var(--ink);color:#fff;border:none;padding:12px;border-radius:12px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:inherit}
.b-preset-alt{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.b-stepper{background:#fff;border:1px solid var(--line);border-radius:13px;margin-bottom:9px}
.b-strow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px}
.b-stinfo{min-width:0}
.b-sttitle{font-weight:700;font-size:14.5px}
.b-stdesc{font-size:12px;color:var(--mut);margin-top:2px;line-height:1.35}
.b-stctl{display:flex;align-items:center;gap:10px;flex-shrink:0}
.b-stbtn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);background:var(--soft);font-size:20px;font-weight:700;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.b-stbtn:hover{border-color:var(--green);color:var(--greenDk)}
.b-stval{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px;width:36px;text-align:center;color:var(--greenDk)}
.b-rnote{font-size:12px;color:var(--mut);line-height:1.5;margin-top:11px;padding:0 2px}

.b-galera{padding-top:4px}
.b-addplayer{display:flex;gap:8px;margin-bottom:12px}
.b-pinput{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;font-size:15px;font-family:inherit;background:#fff}
.b-pinput:focus{outline:2px solid var(--green);outline-offset:1px;border-color:var(--green)}
.b-padd{display:flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:none;padding:0 15px;border-radius:11px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.b-padd:disabled{background:#C2C9D6;cursor:not-allowed}
.b-warn{background:var(--redSoft);color:#a13b30;font-size:12.5px;padding:9px 12px;border-radius:10px;margin-bottom:10px}
.b-plist{display:flex;flex-direction:column;gap:8px}
.b-prow{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 10px 8px 12px}
.b-prow-me{box-shadow:0 0 0 2px var(--green)}
.b-pname{flex:1;border:none;font-size:15px;font-weight:600;font-family:inherit;background:transparent;padding:4px 0;min-width:0}
.b-pname:focus{outline:none;border-bottom:1.5px solid var(--green)}
.b-pacts{display:flex;align-items:center;gap:8px;flex-shrink:0}
.b-pme{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--greenDk);background:var(--greenSoft);padding:5px 9px;border-radius:8px}
.b-pbe{display:flex;align-items:center;gap:2px;font-size:12.5px;font-weight:600;color:var(--ink);background:var(--soft);border:1px solid var(--line);padding:6px 9px;border-radius:8px;cursor:pointer;font-family:inherit}
.b-prem{background:none;border:none;color:#C2C9D6;cursor:pointer;display:flex;padding:4px}
.b-prem:hover{color:var(--red)}

.b-foot{text-align:center;font-size:11.5px;color:var(--mut);padding:14px 18px 6px;line-height:1.5}
.b-foot-tag{color:var(--greenDk);font-weight:600}

.b-modal-bg{position:fixed;inset:0;background:rgba(14,23,38,.55);display:flex;align-items:flex-end;justify-content:center;z-index:50;padding:0}
@media(min-width:620px){.b-modal-bg{align-items:center;padding:20px}}
.b-modal{background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:18px 18px 22px}
@media(min-width:620px){.b-modal{border-radius:18px}}
.b-modal-head{display:flex;align-items:center;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;letter-spacing:.03em;margin-bottom:15px}
.b-mclose{background:var(--soft);border:none;border-radius:9px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mut)}
.b-mfield{margin-bottom:11px}
.b-mfield label{display:block;font-size:12px;font-weight:600;color:var(--mut);margin-bottom:5px}
.b-mfield input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;background:#fff}
.b-mfield input:focus{outline:2px solid var(--green);outline-offset:1px;border-color:var(--green)}
.b-mgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.b-msave{width:100%;margin-top:8px;background:var(--green);color:#fff;border:none;padding:13px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit}
.b-msave:disabled{background:#C2C9D6;cursor:not-allowed}

/* setup screen */
.b-setup{max-width:560px;margin:0 auto;padding:26px 18px 40px}
.b-setup-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 1px 3px rgba(16,23,38,.06)}
.b-setup h1{font-family:'Barlow Condensed',sans-serif;font-size:26px;letter-spacing:.03em;margin-bottom:4px}
.b-setup p{font-size:13.5px;color:var(--mut);line-height:1.55;margin-bottom:14px}
.b-step{display:flex;gap:12px;margin-bottom:14px}
.b-stepn{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif}
.b-stept{font-size:13.5px;line-height:1.5}
.b-stept b{color:var(--txt)}
.b-pre{background:#0E1726;color:#D7E3DC;border-radius:10px;padding:12px 14px;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;line-height:1.5;overflow-x:auto;white-space:pre;margin:10px 0 4px}
.b-code{background:var(--soft);border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-family:ui-monospace,monospace;font-size:12px;color:var(--greenDk)}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

  "Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croácia":"🇭🇷","Gana":"🇬🇭","Panamá":"🇵🇦",
};
const flag = (t) => FLAGS[t] || "🏳️";
const DEFAULT_CFG = { exato:10, vencGols:7, venc:5, gols:2 };

const num = (x) => (x === "" || x == null || isNaN(Number(x)) ? null : Number(x));
function scorePick(pick, res, cfg){
  if(!pick || !res) return null;
  const ph=num(pick.h), pa=num(pick.a), rh=num(res.h), ra=num(res.a);
  if(ph==null||pa==null||rh==null||ra==null) return null;
  if(ph===rh && pa===ra) return cfg.exato;
  const sp=Math.sign(ph-pa), sr=Math.sign(rh-ra);
  const oneGoal = ph===rh || pa===ra;
  if(sp===sr && oneGoal) return cfg.vencGols;
  if(sp===sr) return cfg.venc;
  if(oneGoal) return cfg.gols;
  return 0;
}
const isExact = (pick,res) => {
  if(!pick||!res) return false;
  const ph=num(pick.h),pa=num(pick.a),rh=num(res.h),ra=num(res.a);
  return ph!=null&&pa!=null&&ph===rh&&pa===ra;
};
const hasResult = (res) => res && num(res.h)!=null && num(res.a)!=null;

const todayISO = () => {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const fmtChip = (iso) => {
  const d=new Date(iso+"T12:00:00");
  return d.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"}).replace(".","");
};

/* ---------- Supabase (banco compartilhado) ---------- */
const CONFIGURED = /^https:\/\/.+\.supabase\.co/.test(SUPABASE_URL) && SUPABASE_ANON_KEY.length > 30;
const sb = CONFIGURED ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

async function dbReadAll(){
  const { data, error } = await sb.from("bolao_kv").select("key,value");
  if(error) throw error;
  const map = {};
  for(const row of (data||[])) map[row.key] = row.value;
  return map;
}
async function dbSet(key, value){
  const { error } = await sb.from("bolao_kv").upsert({ key, value, updated_at:new Date().toISOString() });
  if(error) console.error("Erro ao salvar", key, error);
}

/* ============================================================ */
function App(){
  if(!CONFIGURED) return <Setup />;

  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState("jogos");
  const [err,setErr]=useState(null);

  const [cfg,setCfg]=useState(DEFAULT_CFG);
  const [players,setPlayers]=useState([]);
  const [cgames,setCgames]=useState([]);
  const [res,setRes]=useState({});
  const [allPicks,setAllPicks]=useState({});
  const [me,setMe]=useState(null);
  const [myPicks,setMyPicks]=useState({});

  const [dateSel,setDateSel]=useState("hoje");
  const [showAdd,setShowAdd]=useState(false);
  const [syncing,setSyncing]=useState(false);

  const timers=useRef({});
  const pending=useRef({});
  const allGames=[...BASE_GAMES,...cgames];

  const scheduleSave=useCallback((key,val,delay=600)=>{
    pending.current[key]=true; setSyncing(true);
    clearTimeout(timers.current[key]);
    timers.current[key]=setTimeout(async()=>{
      await dbSet(key,val);
      pending.current[key]=false;
      if(!Object.values(pending.current).some(Boolean)) setSyncing(false);
    },delay);
  },[]);

  const refreshAll=useCallback(async(initial)=>{
    if(initial!==true && Object.values(pending.current).some(Boolean)) return;
    setSyncing(true);
    try{
      const map=await dbReadAll(); setErr(null);
      if(map.cfg && !pending.current.cfg) setCfg({...DEFAULT_CFG,...map.cfg});
      if(Array.isArray(map.players) && !pending.current.players) setPlayers(map.players);
      if(Array.isArray(map.cgames) && !pending.current.cgames) setCgames(map.cgames);
      if(map.res && typeof map.res==="object" && !pending.current.res) setRes(map.res);
      const ap={};
      Object.keys(map).forEach(k=>{ if(k.indexOf("pk:")===0) ap[k.slice(3)]=map[k]; });
      setAllPicks(ap);
      if(initial===true){
        const savedMe=localStorage.getItem("bolao_me");
        if(savedMe && (map.players||[]).some(p=>p.id===savedMe)){ setMe(savedMe); setMyPicks(ap[savedMe]||{}); }
        setLoading(false);
      }
    }catch(e){
      setErr("Não consegui falar com o banco. Confira se a URL e a chave estão certas e se você rodou o SQL de criação da tabela.");
      if(initial===true) setLoading(false);
    }
    setSyncing(false);
  },[]);

  useEffect(()=>{ refreshAll(true); },[refreshAll]);
  useEffect(()=>{
    const id=setInterval(()=>{ if(document.visibilityState==="visible") refreshAll(false); },12000);
    const onFocus=()=>refreshAll(false);
    window.addEventListener("focus",onFocus);
    return ()=>{ clearInterval(id); window.removeEventListener("focus",onFocus); };
  },[refreshAll]);

  const picksFor=(pid)=> (pid===me ? myPicks : (allPicks[pid]||{}));

  function setMyPick(gid,side,value){
    if(!me) return;
    const v=value.replace(/[^0-9]/g,"").slice(0,2);
    setMyPicks(prev=>{ const next={...prev,[gid]:{...(prev[gid]||{}),[side]:v}}; scheduleSave("pk:"+me,next,700); return next; });
  }
  function setResult(gid,side,value){
    const v=value.replace(/[^0-9]/g,"").slice(0,2);
    setRes(prev=>{ const next={...prev,[gid]:{...(prev[gid]||{}),[side]:v}}; scheduleSave("res",next,500); return next; });
  }
  function updateCfg(key,val){
    const v=Math.max(0,Math.min(99,Number(val)||0));
    setCfg(prev=>{ const next={...prev,[key]:v}; scheduleSave("cfg",next,300); return next; });
  }
  function applyPreset(p){
    const next = p==="simples" ? {exato:6,vencGols:3,venc:3,gols:0} : {...DEFAULT_CFG};
    setCfg(next); scheduleSave("cfg",next,100);
  }
  function addPlayer(name){
    const nm=name.trim(); if(!nm) return;
    const id="p"+Date.now()+Math.floor(Math.random()*1000);
    const next=[...players,{id,name:nm}]; setPlayers(next); scheduleSave("players",next,200);
    if(!me){ setMe(id); setMyPicks({}); localStorage.setItem("bolao_me",id); }
  }
  function renamePlayer(id,name){ const next=players.map(p=>p.id===id?{...p,name}:p); setPlayers(next); scheduleSave("players",next,400); }
  function removePlayer(id){
    const next=players.filter(p=>p.id!==id); setPlayers(next); scheduleSave("players",next,200);
    if(me===id){ setMe(null); setMyPicks({}); localStorage.removeItem("bolao_me"); }
  }
  function chooseMe(id){ setMe(id); localStorage.setItem("bolao_me",id); setMyPicks(allPicks[id]||{}); }
  function addGame(g){ const id="c"+Date.now(); const next=[...cgames,{...g,id}]; setCgames(next); scheduleSave("cgames",next,200); setShowAdd(false); }
  function removeGame(id){ const next=cgames.filter(g=>g.id!==id); setCgames(next); scheduleSave("cgames",next,200); }

  const dates=Array.from(new Set(allGames.map(g=>g.date))).sort();
  const tISO=todayISO();
  const todayHasGames=dates.includes(tISO);
  const visibleGames=allGames.filter(g=>{
    if(dateSel==="todos") return true;
    if(dateSel==="hoje") return g.date===tISO;
    return g.date===dateSel;
  }).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const todayCount=allGames.filter(g=>g.date===tISO).length;

  const ranking=players.map(p=>{
    const pk=picksFor(p.id); let pts=0,cravadas=0,palpites=0;
    for(const g of allGames){
      const s=scorePick(pk[g.id],res[g.id],cfg);
      if(pk[g.id] && num(pk[g.id].h)!=null && num(pk[g.id].a)!=null) palpites++;
      if(s!=null) pts+=s;
      if(isExact(pk[g.id],res[g.id])) cravadas++;
    }
    return {...p,pts,cravadas,palpites};
  }).sort((a,b)=> b.pts-a.pts || b.cravadas-a.cravadas || a.name.localeCompare(b.name));
  const maxPts=Math.max(1,...ranking.map(r=>r.pts));

  if(loading) return (
    <div className="b-app b-center"><div className="b-load"><Icon name="trophy" size={26}/><span>Carregando bolão…</span></div></div>
  );

  return (
    <div className="b-app">
      <header className="b-head">
        <div className="b-head-row">
          <div className="b-brand">
            <span className="b-logo"><Icon name="trophy" size={20}/></span>
            <div><div className="b-title">BOLÃO · COPA 2026</div><div className="b-sub">3ª rodada · fase de grupos</div></div>
          </div>
          <button className="b-refresh" onClick={()=>refreshAll(false)} aria-label="Atualizar">
            <Icon name="refresh" size={16} className={syncing?"b-spin":""}/>
          </button>
        </div>
        <div className="b-idrow">
          <label className="b-idlabel">Você é:</label>
          {players.length===0 ? (
            <button className="b-idadd" onClick={()=>setTab("galera")}><Icon name="plus" size={14}/> Adicionar participantes</button>
          ) : (
            <select className="b-select" value={me||""} onChange={(e)=> e.target.value && chooseMe(e.target.value)}>
              <option value="" disabled>escolha seu nome…</option>
              {players.map(p=> <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          )}
        </div>
      </header>

      <nav className="b-tabs">
        <Tab icon={<Icon name="list" size={15}/>} label="Jogos" active={tab==="jogos"} onClick={()=>setTab("jogos")}/>
        <Tab icon={<Icon name="trophy" size={15}/>} label="Classificação" active={tab==="rank"} onClick={()=>{setTab("rank");refreshAll(false);}}/>
        <Tab icon={<Icon name="sliders" size={15}/>} label="Regras" active={tab==="regras"} onClick={()=>setTab("regras")}/>
        <Tab icon={<Icon name="users" size={15}/>} label="Galera" active={tab==="galera"} onClick={()=>setTab("galera")}/>
      </nav>

      <main className="b-main">
        {err && <div className="b-err">{err}</div>}
        {tab==="jogos" && (
          <JogosTab dates={dates} dateSel={dateSel} setDateSel={setDateSel} tISO={tISO}
            todayHasGames={todayHasGames} todayCount={todayCount} games={visibleGames}
            me={me} myPicks={myPicks} res={res} cfg={cfg} setMyPick={setMyPick} setResult={setResult}
            onAdd={()=>setShowAdd(true)} removeGame={removeGame}/>
        )}
        {tab==="rank" && <RankTab ranking={ranking} maxPts={maxPts} me={me} hasAnyResult={Object.values(res).some(hasResult)}/>}
        {tab==="regras" && <RegrasTab cfg={cfg} updateCfg={updateCfg} applyPreset={applyPreset}/>}
        {tab==="galera" && <GaleraTab players={players} me={me} addPlayer={addPlayer} renamePlayer={renamePlayer} removePlayer={removePlayer} chooseMe={chooseMe}/>}
      </main>

      <footer className="b-foot">
        Todos editam os mesmos dados · combine de cada um preencher só os próprios palpites.
        {todayCount>0 && <span className="b-foot-tag"> Hoje: {todayCount} jogos</span>}
      </footer>

      {showAdd && <AddGameModal tISO={tISO} onClose={()=>setShowAdd(false)} onSave={addGame}/>}
    </div>
  );
}

function Tab({icon,label,active,onClick}){
  return <button className={"b-tab"+(active?" b-tab-on":"")} onClick={onClick}>{icon}<span>{label}</span></button>;
}

function JogosTab({dates,dateSel,setDateSel,tISO,todayHasGames,todayCount,games,me,myPicks,res,cfg,setMyPick,setResult,onAdd,removeGame}){
  return (
    <>
      <div className="b-chiprow">
        <button className={"b-chip"+(dateSel==="hoje"?" b-chip-on":"")} onClick={()=>setDateSel("hoje")}>
          Hoje{todayHasGames?` · ${todayCount}`:""}
        </button>
        {dates.map(d=>(
          <button key={d} className={"b-chip"+(dateSel===d?" b-chip-on":"")} onClick={()=>setDateSel(d)}>
            {fmtChip(d)}{d===tISO?" •":""}
          </button>
        ))}
        <button className={"b-chip"+(dateSel==="todos"?" b-chip-on":"")} onClick={()=>setDateSel("todos")}>Todos</button>
      </div>

      {!me && <div className="b-banner">Escolha seu nome lá em cima para começar a palpitar. Sem nome, dá pra ver os jogos, mas não salvar palpites.</div>}

      {games.length===0 ? (
        <div className="b-empty">Nenhum jogo nesse dia. Toque em <b>Todos</b> para ver a rodada inteira, ou adicione um jogo abaixo.</div>
      ) : (
        <div className="b-cards">
          {games.map(g=>(
            <GameCard key={g.id} g={g} me={me} pick={myPicks[g.id]} result={res[g.id]} cfg={cfg}
              setMyPick={setMyPick} setResult={setResult}
              onRemove={g.id.indexOf("c")===0 ? ()=>removeGame(g.id) : null}/>
          ))}
        </div>
      )}

      <button className="b-addbtn" onClick={onAdd}><Icon name="plus" size={16}/> Adicionar jogo</button>
    </>
  );
}

function GameCard({g,me,pick,result,cfg,setMyPick,setResult,onRemove}){
  const pts=scorePick(pick,result,cfg);
  const done=hasResult(result);
  return (
    <div className="b-card">
      <div className="b-card-top">
        <span className="b-grp">Grupo {g.grp}</span>
        <span className="b-when">{fmtChip(g.date)} · {g.time}</span>
        {onRemove && <button className="b-del" onClick={onRemove} aria-label="Remover jogo"><Icon name="trash" size={13}/></button>}
      </div>
      <div className="b-match">
        <div className="b-team b-team-h"><span className="b-tname">{g.home}</span><span className="b-flag">{flag(g.home)}</span></div>
        <div className="b-cap">
          <input className="b-sc" inputMode="numeric" placeholder="–" value={pick?.h ?? ""} disabled={!me}
            onChange={(e)=>setMyPick(g.id,"h",e.target.value)} aria-label={`Seu palpite ${g.home}`}/>
          <span className="b-colon">:</span>
          <input className="b-sc" inputMode="numeric" placeholder="–" value={pick?.a ?? ""} disabled={!me}
            onChange={(e)=>setMyPick(g.id,"a",e.target.value)} aria-label={`Seu palpite ${g.away}`}/>
        </div>
        <div className="b-team b-team-a"><span className="b-flag">{flag(g.away)}</span><span className="b-tname">{g.away}</span></div>
      </div>
      <div className="b-palpite-lbl">seu palpite</div>
      <div className="b-divider"/>
      <div className="b-official">
        <div className="b-off-left">
          <span className="b-off-lbl">Resultado oficial</span>
          <div className="b-off-inputs">
            <input className="b-off" inputMode="numeric" placeholder="–" value={result?.h ?? ""}
              onChange={(e)=>setResult(g.id,"h",e.target.value)} aria-label="Placar oficial casa"/>
            <span className="b-off-x">×</span>
            <input className="b-off" inputMode="numeric" placeholder="–" value={result?.a ?? ""}
              onChange={(e)=>setResult(g.id,"a",e.target.value)} aria-label="Placar oficial fora"/>
          </div>
        </div>
        <div className="b-pts-wrap">
          {pts!=null ? (
            <span className={"b-pts"+(pts>0?" b-pts-win":" b-pts-zero")}>{pts>0?`+${pts}`:"0"}<small>pts</small></span>
          ) : done ? <span className="b-pts-empty">sem palpite</span> : <span className="b-pts-empty">aguardando</span>}
        </div>
      </div>
    </div>
  );
}

function RankTab({ranking,maxPts,me,hasAnyResult}){
  if(ranking.length===0) return <div className="b-empty">Adicione participantes na aba <b>Galera</b> para ver a classificação.</div>;
  const medal=["🥇","🥈","🥉"];
  return (
    <>
      {!hasAnyResult && <div className="b-banner">A pontuação aparece quando os <b>resultados oficiais</b> forem preenchidos nos jogos.</div>}
      <div className="b-rank">
        {ranking.map((r,i)=>(
          <div key={r.id} className={"b-rrow"+(r.id===me?" b-rrow-me":"")+(i<3?" b-rrow-top":"")}>
            <div className="b-rpos">{i<3?medal[i]:i+1}</div>
            <div className="b-rmid">
              <div className="b-rname">{r.name}{r.id===me && <span className="b-you">você</span>}</div>
              <div className="b-rbar"><div className="b-rfill" style={{width:`${(r.pts/maxPts)*100}%`}}/></div>
              <div className="b-rmeta">{r.palpites} palpites · {r.cravadas} cravada{r.cravadas===1?"":"s"}</div>
            </div>
            <div className="b-rpts">{r.pts}<small>pts</small></div>
          </div>
        ))}
      </div>
    </>
  );
}

function RegrasTab({cfg,updateCfg,applyPreset}){
  const rows=[
    {k:"exato",t:"Placar exato",d:"Cravou o resultado certinho"},
    {k:"vencGols",t:"Vencedor + gols de um time",d:"Acertou quem ganhou e os gols de um dos lados"},
    {k:"venc",t:"Só o vencedor (ou empate)",d:"Acertou o resultado, mas não os gols"},
    {k:"gols",t:"Gols de um time",d:"Acertou os gols de um lado, mas errou quem venceu"},
  ];
  return (
    <div className="b-regras">
      <p className="b-rtext">Pontos por acerto. Mude os valores quando quiser — a pontuação recalcula sozinha para todos.</p>
      <div className="b-presets">
        <button className="b-preset" onClick={()=>applyPreset("wander")}>Regras do Wander · 10·7·5·2</button>
        <button className="b-preset b-preset-alt" onClick={()=>applyPreset("simples")}>Regra simples · 6·3</button>
      </div>
      {rows.map(r=>(
        <div key={r.k} className="b-stepper">
          <div className="b-strow">
            <div className="b-stinfo"><div className="b-sttitle">{r.t}</div><div className="b-stdesc">{r.d}</div></div>
            <div className="b-stctl">
              <button className="b-stbtn" onClick={()=>updateCfg(r.k,cfg[r.k]-1)} aria-label="Menos">−</button>
              <span className="b-stval">{cfg[r.k]}</span>
              <button className="b-stbtn" onClick={()=>updateCfg(r.k,cfg[r.k]+1)} aria-label="Mais">+</button>
            </div>
          </div>
        </div>
      ))}
      <p className="b-rnote">Palpite que não acerta nada vale 0. Na “regra simples”, qualquer acerto do vencedor vale igual e errar quem ganhou zera, mesmo acertando um placar.</p>
    </div>
  );
}

function GaleraTab({players,me,addPlayer,renamePlayer,removePlayer,chooseMe}){
  const [name,setName]=useState("");
  return (
    <div className="b-galera">
      <p className="b-rtext">Até 12 participantes. Cada pessoa escolhe o próprio nome no topo do app.</p>
      <div className="b-addplayer">
        <input className="b-pinput" placeholder="Nome do participante" value={name} maxLength={20}
          onChange={(e)=>setName(e.target.value)} onKeyDown={(e)=>{ if(e.key==="Enter"){ addPlayer(name); setName(""); } }}/>
        <button className="b-padd" disabled={!name.trim()||players.length>=12} onClick={()=>{ addPlayer(name); setName(""); }}>
          <Icon name="plus" size={16}/> Adicionar
        </button>
      </div>
      {players.length>=12 && <div className="b-warn">Limite de 12 participantes atingido.</div>}
      <div className="b-plist">
        {players.length===0 && <div className="b-empty">Ninguém ainda. Adicione o primeiro nome acima.</div>}
        {players.map(p=>(
          <div key={p.id} className={"b-prow"+(p.id===me?" b-prow-me":"")}>
            <input className="b-pname" value={p.name} maxLength={20} onChange={(e)=>renamePlayer(p.id,e.target.value)}/>
            <div className="b-pacts">
              {p.id===me ? <span className="b-pme"><Icon name="check" size={13}/> você</span>
                : <button className="b-pbe" onClick={()=>chooseMe(p.id)}>sou eu <Icon name="chev" size={12}/></button>}
              <button className="b-prem" onClick={()=>removePlayer(p.id)} aria-label="Remover"><Icon name="trash" size={14}/></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AddGameModal({tISO,onClose,onSave}){
  const [f,setF]=useState({home:"",away:"",grp:"",date:tISO,time:"16h00"});
  const ok=f.home.trim()&&f.away.trim();
  return (
    <div className="b-modal-bg" onClick={onClose}>
      <div className="b-modal" onClick={(e)=>e.stopPropagation()}>
        <div className="b-modal-head"><span>Adicionar jogo</span><button className="b-mclose" onClick={onClose}><Icon name="x" size={18}/></button></div>
        <div className="b-mfield"><label>Mandante</label><input value={f.home} onChange={(e)=>setF({...f,home:e.target.value})} placeholder="Ex: Brasil"/></div>
        <div className="b-mfield"><label>Visitante</label><input value={f.away} onChange={(e)=>setF({...f,away:e.target.value})} placeholder="Ex: Argentina"/></div>
        <div className="b-mgrid">
          <div className="b-mfield"><label>Grupo / fase</label><input value={f.grp} onChange={(e)=>setF({...f,grp:e.target.value})} placeholder="Oitavas"/></div>
          <div className="b-mfield"><label>Data</label><input type="date" value={f.date} onChange={(e)=>setF({...f,date:e.target.value})}/></div>
          <div className="b-mfield"><label>Hora</label><input value={f.time} onChange={(e)=>setF({...f,time:e.target.value})} placeholder="16h00"/></div>
        </div>
        <button className="b-msave" disabled={!ok}
          onClick={()=>onSave({home:f.home.trim(),away:f.away.trim(),grp:f.grp.trim()||"—",date:f.date,time:f.time.trim()||"--"})}>
          Adicionar jogo
        </button>
      </div>
    </div>
  );
}

function Setup(){
  const sql = `create table if not exists bolao_kv (
  key text primary key,
  value jsonb,
  updated_at timestamptz default now()
);
alter table bolao_kv enable row level security;
create policy "ler"      on bolao_kv for select using (true);
create policy "inserir"  on bolao_kv for insert with check (true);
create policy "atualizar" on bolao_kv for update using (true);`;
  return (
    <div className="b-app"><div className="b-setup">
      <div className="b-setup-card">
        <h1>⚽ Falta só conectar o banco</h1>
        <p>Este é o bolão. Pra galera compartilhar os dados, ele precisa de um banco grátis (Supabase). São 3 passos rápidos:</p>
        <div className="b-step"><div className="b-stepn">1</div><div className="b-stept">Crie uma conta grátis em <b>supabase.com</b> e um <b>New project</b> (qualquer nome e senha).</div></div>
        <div className="b-step"><div className="b-stepn">2</div><div className="b-stept">Abra o <b>SQL Editor</b>, cole o código abaixo e clique em <b>Run</b>:
          <pre className="b-pre">{sql}</pre>
        </div></div>
        <div className="b-step"><div className="b-stepn">3</div><div className="b-stept">Vá em <b>Project Settings → API</b> e copie a <span className="b-code">Project URL</span> e a <span className="b-code">anon public key</span>. Cole as duas no topo deste arquivo (linhas <span className="b-code">SUPABASE_URL</span> e <span className="b-code">SUPABASE_ANON_KEY</span>) e publique.</div></div>
        <p style={{marginTop:18,marginBottom:0}}>Pode me mandar esses 2 valores que eu finalizo e publico pra você. 🙂</p>
      </div>
    </div></div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
